<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{block "title" .}}Sesame Bot{{end}}</title>
  <script src="https://unpkg.com/htmx.org@1.9.12" defer></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f5f7;
      min-height: 100vh;
      margin: 0;
      padding: 1.5rem 1rem 3rem;
      color: #1d1d1f;
    }
    nav {
      max-width: 680px;
      margin: 0 auto 1.5rem;
      display: flex;
      align-items: center;
      gap: 1.5rem;
    }
    nav .brand { font-weight: 700; font-size: 1.05rem; color: #1d1d1f; text-decoration: none; }
    nav a { font-size: .875rem; color: #6e6e73; text-decoration: none; transition: color .15s; }
    nav a:hover { color: #1d1d1f; }
    nav .spacer { flex: 1; }
    .card {
      background: #fff;
      border-radius: 18px;
      padding: 2.25rem 2rem;
      width: 100%;
      max-width: 680px;
      margin: 0 auto;
      box-shadow: 0 2px 24px rgba(0,0,0,.07);
    }
    .card-sm { max-width: 420px; }
    h1 { font-size: 1.5rem; font-weight: 700; margin: 0 0 1.5rem; letter-spacing: -.025em; }
    h2 { font-size: 1.15rem; font-weight: 600; margin: 0 0 1.25rem; letter-spacing: -.02em; }
    label {
      display: block;
      font-size: .78rem;
      font-weight: 500;
      color: #6e6e73;
      text-transform: uppercase;
      letter-spacing: .055em;
      margin-top: 1.25rem;
    }
    .hint { font-size: .8em; color: #aeaeb2; font-weight: 400; text-transform: none; letter-spacing: 0; }
    input[type=text], input[type=email], input[type=password], select, textarea {
      width: 100%;
      padding: .65rem .85rem;
      margin-top: .35rem;
      border: 1.5px solid #e0e0e5;
      border-radius: 10px;
      font-size: .95rem;
      color: #1d1d1f;
      background: #fafafa;
      outline: none;
      transition: border-color .15s, box-shadow .15s;
      font-family: inherit;
    }
    input:focus, select:focus, textarea:focus {
      border-color: #0071e3;
      box-shadow: 0 0 0 3px rgba(0,113,227,.12);
      background: #fff;
    }
    select[multiple] { padding: .5rem .85rem; line-height: 1.8; }
    .btn {
      display: inline-block;
      padding: .65rem 2rem;
      border: none;
      border-radius: 10px;
      background: #0071e3;
      color: #fff;
      font-size: .95rem;
      font-weight: 500;
      cursor: pointer;
      transition: background .15s, transform .1s;
      font-family: inherit;
      text-decoration: none;
      text-align: center;
    }
    .btn:hover { background: #0077ed; }
    .btn:active { transform: scale(.98); }
    .btn-sm { padding: .45rem 1.2rem; font-size: .85rem; border-radius: 8px; }
    .btn-danger { background: #e3001a; }
    .btn-danger:hover { background: #c0001a; }
    .btn-ghost { background: transparent; color: #6e6e73; border: 1.5px solid #e0e0e5; }
    .btn-ghost:hover { background: #f5f5f7; color: #1d1d1f; }
    .flash-ok {
      display: flex; align-items: center; gap: .5rem;
      padding: .7rem 1rem; border-radius: 10px;
      background: #f0faf4; color: #1a7f4b;
      font-size: .875rem; margin-bottom: 1.25rem;
    }
    .flash-err {
      display: flex; align-items: center; gap: .5rem;
      padding: .7rem 1rem; border-radius: 10px;
      background: #fff2f2; color: #c0392b;
      font-size: .875rem; margin-bottom: 1.25rem;
    }
    .pw-wrap { position: relative; margin-top: .35rem; }
    .pw-wrap input { margin-top: 0; padding-right: 2.8rem; }
    .pw-toggle {
      position: absolute; right: .65rem; top: 50%;
      transform: translateY(-50%);
      background: none; border: none; padding: .25rem;
      cursor: pointer; color: #aeaeb2; display: flex; align-items: center;
    }
    .pw-toggle:hover { color: #1d1d1f; }
    table { width: 100%; border-collapse: collapse; font-size: .875rem; margin-top: .5rem; }
    th { text-align: left; font-size: .75rem; font-weight: 600; color: #6e6e73; text-transform: uppercase; letter-spacing: .05em; padding: .5rem .75rem; border-bottom: 1.5px solid #e0e0e5; }
    td { padding: .6rem .75rem; border-bottom: 1px solid #f0f0f5; vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    .badge {
      display: inline-block; padding: .2rem .6rem; border-radius: 20px;
      font-size: .75rem; font-weight: 600;
    }
    .badge-ok { background: #e8f9ee; color: #1a7f4b; }
    .badge-err { background: #fff0f0; color: #c0392b; }
    .badge-skip { background: #f5f5f7; color: #6e6e73; }
    .badge-active { background: #e8f9ee; color: #1a7f4b; }
    .badge-inactive { background: #fff0f0; color: #c0392b; }
    .actions { margin-top: 1.75rem; display: flex; align-items: center; gap: 1rem; flex-wrap: wrap; }
    .section-divider { border: none; border-top: 1.5px solid #f0f0f5; margin: 1.75rem 0; }
  </style>
</head>
<body>
{{block "nav" .}}{{end}}
{{block "content" .}}{{end}}
</body>
</html>

{{template "base.html" .}}
{{define "title"}}Sesame Bot — Crear cuenta{{end}}
{{define "nav"}}{{end}}
{{define "content"}}
<div class="card card-sm">
  <h1>Crear cuenta</h1>
  {{if .Error}}<div class="flash-err">{{.Error}}</div>{{end}}
  <form method="POST" action="/register">
    <label>Correo electrónico
      <input type="email" name="email" autofocus required value="{{.Email}}">
    </label>
    <label>Contraseña <span class="hint">(mínimo 8 caracteres)</span></label>
    <div class="pw-wrap">
      <input id="pw" type="password" name="password" required minlength="8">
      <button type="button" class="pw-toggle" onclick="togglePw()" aria-label="Mostrar">
        <svg id="ico-s" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        <svg id="ico-h" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
      </button>
    </div>
    <div class="actions">
      <button type="submit" class="btn" style="width:100%">Registrarse</button>
    </div>
  </form>
  <p style="text-align:center;margin-top:1.25rem;font-size:.875rem;color:#6e6e73">
    ¿Ya tienes cuenta? <a href="/login" style="color:#0071e3">Entrar</a>
  </p>
</div>
<script>
function togglePw() {
  var inp = document.getElementById('pw');
  var show = document.getElementById('ico-s');
  var hide = document.getElementById('ico-h');
  if (inp.type === 'password') { inp.type = 'text'; show.style.display='none'; hide.style.display=''; }
  else { inp.type = 'password'; show.style.display=''; hide.style.display='none'; }
}
</script>
{{end}}

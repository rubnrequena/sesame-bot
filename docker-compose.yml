services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: sesame
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: sesame_bot
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sesame -d sesame_bot"]
      interval: 5s
      timeout: 5s
      retries: 10

  sesame-bot:
    image: rubn1987/sesame-bot:latest
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"
    env_file:
      - .env
    volumes:
      - ./migrations:/app/migrations:ro

volumes:
  postgres_data:
